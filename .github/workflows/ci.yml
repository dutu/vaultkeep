name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.13"

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install archive tools
        run: >-
          sudo apt-get update
          && sudo apt-get install --yes --no-install-recommends zstd 7zip

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install locked development dependencies
        run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements-dev.lock

      - name: Install Vaultkeep
        run: python -m pip install --no-deps --no-build-isolation --editable .

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy

      - name: Test
        run: pytest -vv
